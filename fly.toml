app = "pisubí-backend"
primary_region = "gru"   # São Paulo — más cercano a AR

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONIOENCODING = "utf-8"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Volumen persistente para la DB SQLite
# Crear con: fly volumes create pisubi_data --size 1 --region gru
[[mounts]]
  source = "pisubi_data"
  destination = "/app/backend/db"
